            <button onclick="submitLink()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-lg mt-4 hover:bg-slate-900 transition">Submit Link</button>

        <div class="mt-10">

    <script>
        // === 1. KONFIGURASI (PASTIKAN URL & KEY BETUL) ===
        const SUPABASE_URL = 'https://lvbukfjwowwmnkdlmakw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_avWWEg703DcENqAi-fBAAA_AgV9WmRs';
        const ADMIN_EMAIL = 'saifuljtk@gmail.com'; // <--- TUKAR KE EMAIL KAU
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let userPoints = 0;

        // === 2. FUNGSI CEK USER & LEADERBOARD ===
        async function checkUser() {
            const { data: { user }, error: authError } = await _supabase.auth.getUser();
            
            if (user) {
                currentUser = user;
                
                // Ambil point tanpa guna .single() untuk elak error 406
                const { data, error } = await _supabase
                    .from('profiles')
                    .select('points')
                    .eq('id', user.id);

                if (data && data.length > 0) {
                    userPoints = data[0].points;
                } else {
                    // Jika profile tak wujud lagi, kita buatkan satu
                    await _supabase.from('profiles').insert([{ id: user.id, username: user.email, points: 5 }]);
                    userPoints = 5;
                }

                document.getElementById('authArea').classList.add('hidden');
                document.getElementById('appArea').classList.remove('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                
                updateUI();
                loadLeaderboard();
            }
        }

        async function loadLeaderboard() {
            const { data, error } = await _supabase
                .from('profiles')
                .select('username, points')
                .order('points', { ascending: false })
                .limit(5);

            const lbContainer = document.getElementById('leaderboardList');
            if (error || !data) return;

            lbContainer.innerHTML = '';
            data.forEach((user, index) => {
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '👤';
                const item = document.createElement('div');
                item.className = "flex justify-between items-center p-2 border-b border-slate-100 last:border-0";
                item.innerHTML = `
                    <span class="text-sm font-medium text-slate-700">${medal} ${user.username.split('@')[0]}</span>
                    <span class="text-xs font-bold bg-indigo-100 text-indigo-600 px-2 py-1 rounded">${user.points} pts</span>
                `;
                lbContainer.appendChild(item);
            });
        }

        // === 3. FUNGSI AUTH & LOGOUT ===
        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            if (!email || !password) return alert("Isi email dan password!");

            let { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: sErr } = await _supabase.auth.signUp({ email, password });
                if (sErr) return alert(sErr.message);
                alert("Akaun dicipta! Sila klik Login sekali lagi.");
            } else {
                window.location.reload();
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        // === 4. FUNGSI LINKS (LOAD & DELETE) ===
       async function loadLinks(platform) {
            const container = document.getElementById('linksContainer');
            container.innerHTML = `<div class="text-center p-10 text-slate-500">Mencari link ${platform}...</div>`;

            const { data, error } = await _supabase
                .from('links_pool')
                .select('*')
                .eq('platform', platform)
                .order('created_at', { ascending: false });

            if (!data || data.length === 0) {
                container.innerHTML = `<div class="bg-white p-10 rounded-xl text-center border-2 border-dashed">Tiada link ${platform} lagi.</div>`;
                return;
            }

            container.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4";
                
                const isAdmin = currentUser && currentUser.email === ADMIN_EMAIL;
                const deleteBtn = isAdmin ? `<button onclick="deleteLink('${item.id}')" class="text-red-500 hover:text-red-700 text-[10px] font-bold mt-2 md:mt-0">🗑️ DELETE</button>` : '';

                // --- LOGIK BUTANG IKUT KUOTA ---
                let buttonsHtml = '';

                // Butang View
                if (item.count_view < item.target_view) {
                    buttonsHtml += `
                        <button onclick="engageLink('${item.url}', '${item.id}', 'view')" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg font-bold text-xs transition flex items-center gap-1">
                            👁️ ${item.count_view}/${item.target_view} <span class="opacity-70">+1</span>
                        </button>`;
                }

                // Butang Comment
                if (item.count_comment < item.target_comment) {
                    buttonsHtml += `
                        <button onclick="engageLink('${item.url}', '${item.id}', 'comment')" class="bg-green-600 hover:bg-green-700 text-white px-3 py-2 rounded-lg font-bold text-xs transition flex items-center gap-1">
                            💬 ${item.count_comment}/${item.target_comment} <span class="opacity-70">+1</span>
                        </button>`;
                }

                // Butang Share
                if (item.count_share < item.target_share) {
                    buttonsHtml += `
                        <button onclick="engageLink('${item.url}', '${item.id}', 'share')" class="bg-pink-600 hover:bg-pink-700 text-white px-3 py-2 rounded-lg font-bold text-xs transition flex items-center gap-1">
                            🚀 ${item.count_share}/${item.target_share} <span class="opacity-70">+1</span>
                        </button>`;
                }

                // Kalau semua task dah penuh
                if (buttonsHtml === '') {
                    buttonsHtml = '<span class="text-xs font-bold text-slate-400 italic bg-slate-100 px-3 py-1 rounded-full">✅ SEMUA TASK SELESAI</span>';
                }

                card.innerHTML = `
                    <div class="flex-1">
                        <p class="text-[10px] font-black text-indigo-600 uppercase tracking-tighter mb-1">${item.platform}</p>
                        <p class="font-bold text-slate-800 text-md leading-tight">${item.caption}</p>
                    </div>
                    <div class="flex flex-wrap items-center gap-2">
                        ${buttonsHtml}
                        ${deleteBtn}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function deleteLink(id) {
            if (!confirm("Kau serius nak delete link ni?")) return;
            const { error } = await _supabase.from('links_pool').delete().eq('id', id);
            if (error) alert("Error: " + error.message);
            else location.reload();
        }

        // === 5. FUNGSI SUPPORT & SUBMIT ===
        async function engageLink(url, linkId, taskType) {
    // 1. Cek duplicate macam biasa
    const { data: sedia_ada } = await _supabase.from('link_clicks').select('*').eq('user_id', currentUser.id).eq('link_id', linkId).eq('task_type', taskType);
    if (sedia_ada && sedia_ada.length > 0) return alert("Dah buat!");

    window.open(url, '_blank');

    // 2. Simpan klik record
    const { error: clickErr } = await _supabase.from('link_clicks').insert([{ user_id: currentUser.id, link_id: linkId, task_type: taskType }]);

    if (!clickErr) {
        // 3. Update counter dalam links_pool secara dinamik
        const updateField = `count_${taskType}`;
        const { data: currentLink } = await _supabase.from('links_pool').select(updateField).eq('id', linkId).single();
        
        let newCount = currentLink[updateField] + 1;
        
        await _supabase.from('links_pool').update({ [updateField]: newCount }).eq('id', linkId);

        // 4. Beri point kepada user yang klik
        userPoints += 1;
        updateUI();
        await _supabase.from('profiles').update({ points: userPoints }).eq('id', currentUser.id);
    }
}

        async function submitLink() {
    const url = document.getElementById('newLinkUrl').value;
    const platform = document.getElementById('newLinkPlatform').value;
    const caption = document.getElementById('newLinkCaption').value;
    
    // Ambil nilai kuota
    const tView = parseInt(document.getElementById('numView').value) || 0;
    const tComment = parseInt(document.getElementById('numComment').value) || 0;
    const tShare = parseInt(document.getElementById('numShare').value) || 0;
    
    const totalCost = tView + tComment + tShare;

    if (!url || !caption) return alert("Sila isi link dan caption!");
    if (totalCost <= 0) return alert("Sila letak sekurang-kurangnya 1 kuota task!");
    if (userPoints < totalCost) return alert(`Point tak cukup! Kos: ${totalCost}, Point kau: ${userPoints}`);

    const { error } = await _supabase.from('links_pool').insert([
        { 
            user_id: currentUser.id, 
            url, platform, caption, 
            target_view: tView, 
            target_comment: tComment, 
            target_share: tShare,
            is_active: true 
        }
    ]);

    if (!error) {
        userPoints -= totalCost;
        await _supabase.from('profiles').update({ points: userPoints }).eq('id', currentUser.id);
        alert("Link Berjaya Di-post!");
        location.reload();
    }
}

        function updateUI() {
            document.getElementById('pointDisplay').innerText = userPoints;
        }

        // 1. Fungsi untuk Dengar Perubahan Data Secara Live
        function setupRealtime() {
            _supabase
                .channel('schema-db-changes')
                .on(
                    'postgres_changes',
                    {
                        event: '*', // Dengar semua (INSERT, DELETE, UPDATE)
                        schema: 'public',
                        table: 'links_pool'
                    },
                    (payload) => {
                        console.log('Ada perubahan data!', payload);
                        
                        // Jika ada link baru atau link kena delete, refresh senarai kat skrin
                        // Kita ambil platform yang sedang aktif sekarang
                        const activePlatform = document.querySelector('button.bg-blue-50')?.innerText.toLowerCase() || 'tiktok';
                        
                        // Auto-update senarai link & leaderboard tanpa refresh page
                        loadLinks(activePlatform.replace('🔵 ', '').replace('⚫ ', '').replace('🟣 ', '').replace('🔴 ', '').trim());
                        loadLeaderboard();
                    }
                )
                .subscribe();
        }

        // 2. Kemas kini fungsi checkUser untuk panggil setupRealtime
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                currentUser = user;
                const { data } = await _supabase.from('profiles').select('points').eq('id', user.id);

                if (data && data.length > 0) {
                    userPoints = data[0].points;
                }
                
                document.getElementById('authArea').classList.add('hidden');
                document.getElementById('appArea').classList.remove('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                
                updateUI();
                loadLeaderboard();
                setupRealtime(); // <--- TAMBAH NI SUPAYA DIA MULA MENDENGAR
            }
        }

        // Mula Check User
        checkUser();
        
    </script>
