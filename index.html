<body class="bg-slate-50 font-sans min-h-screen">

    <nav class="bg-indigo-600 p-4 text-white shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold tracking-tight">🚀 ShareLink</h1>
            <div id="userInfo" class="flex items-center gap-3 hidden">
                <span class="bg-indigo-800 px-3 py-1 rounded-full text-sm font-bold">
                    Points: <span id="pointDisplay">0</span>
                </span>
                <button onclick="handleLogout()" class="text-xs bg-indigo-500 hover:bg-indigo-400 px-2 py-1 rounded">Logout</button>
            </div>
        </div>
    </nav>

    <div id="authArea" class="max-w-md mx-auto mt-20 p-8 bg-white rounded-2xl shadow-xl text-center">
        <h2 class="text-2xl font-bold text-slate-800">Selamat Datang!</h2>
        <p class="text-slate-500 mt-2 mb-6">Sila login atau daftar untuk mula kumpul point.</p>
        <div class="space-y-4 text-left">
            <div>
                <label class="text-sm font-semibold">Email</label>
                <input type="email" id="authEmail" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <div>
                <label class="text-sm font-semibold">Password</label>
                <input type="password" id="authPass" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
            </div>
            <button onclick="handleAuth()" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">Login / Daftar</button>
        </div>
    </div>

    <div id="appArea" class="max-w-4xl mx-auto p-4 hidden">

        <div class="mt-6 bg-white rounded-2xl shadow-sm border border-slate-200 p-5">
    <h3 class="font-bold text-slate-800 mb-3 flex items-center gap-2">
        🏆 Top Supporters
    </h3>
    <div id="leaderboardList" class="space-y-1 text-sm">
        <p class="text-slate-400 italic">Memuatkan ranking...</p>
    </div>
</div>
        
        <div class="mt-6 p-6 bg-white rounded-2xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-slate-800 mb-4">Post Link Baru <span class="text-red-500 text-xs">(Kos: 5 Points)</span></h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="newLinkUrl" placeholder="URL Link (https://...)" class="p-3 border rounded-lg outline-none">
                <select id="newLinkPlatform" class="p-3 border rounded-lg outline-none bg-white">
                    <option value="tiktok">TikTok</option>
                    <option value="facebook">Facebook</option>
                    <option value="instagram">Instagram</option>
                    <option value="youtube">YouTube</option>
                </select>
            </div>
            <input type="text" id="newLinkCaption" placeholder="Caption SEO Pendek (Keywords)" class="w-full p-3 border rounded-lg mt-3 outline-none">
            <button onclick="submitLink()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-lg mt-4 hover:bg-slate-900 transition">Submit Link</button>
        </div>

        <div class="mt-10">
            <h3 class="text-center font-bold text-slate-700 mb-4 text-lg">Pilih Kategori Support</h3>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                <button onclick="loadLinks('facebook')" class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-blue-500 font-bold hover:bg-blue-50 transition">🔵 FB</button>
                <button onclick="loadLinks('tiktok')" class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-black font-bold hover:bg-slate-50 transition">⚫ TikTok</button>
                <button onclick="loadLinks('instagram')" class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-pink-500 font-bold hover:bg-pink-50 transition">🟣 IG</button>
                <button onclick="loadLinks('youtube')" class="bg-white p-4 rounded-xl shadow-sm border-b-4 border-red-500 font-bold hover:bg-red-50 transition">🔴 YT</button>
            </div>
        </div>

        <div id="linksContainer" class="mt-8 space-y-4 pb-20">
            <p class="text-center text-slate-400 italic">Pilih kategori di atas untuk mula.</p>
        </div>
    </div>

    <script>
        // === 1. KONFIGURASI (PASTIKAN URL & KEY BETUL) ===
        const SUPABASE_URL = 'https://lvbukfjwowwmnkdlmakw.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_avWWEg703DcENqAi-fBAAA_AgV9WmRs';
        const ADMIN_EMAIL = 'saifuljtk@gmail.com'; // <--- TUKAR KE EMAIL KAU
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = null;
        let userPoints = 0;

        // === 2. FUNGSI CEK USER & LEADERBOARD ===
        async function checkUser() {
            const { data: { user } } = await _supabase.auth.getUser();
            if (user) {
                currentUser = user;
                const { data } = await _supabase.from('profiles').select('points').eq('id', user.id).single();
                userPoints = data ? data.points : 0;
                
                document.getElementById('authArea').classList.add('hidden');
                document.getElementById('appArea').classList.remove('hidden');
                document.getElementById('userInfo').classList.remove('hidden');
                
                updateUI();
                loadLeaderboard();
            }
        }

        async function loadLeaderboard() {
            const { data, error } = await _supabase
                .from('profiles')
                .select('username, points')
                .order('points', { ascending: false })
                .limit(5);

            const lbContainer = document.getElementById('leaderboardList');
            if (error || !data) return;

            lbContainer.innerHTML = '';
            data.forEach((user, index) => {
                const medal = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '👤';
                const item = document.createElement('div');
                item.className = "flex justify-between items-center p-2 border-b border-slate-100 last:border-0";
                item.innerHTML = `
                    <span class="text-sm font-medium text-slate-700">${medal} ${user.username.split('@')[0]}</span>
                    <span class="text-xs font-bold bg-indigo-100 text-indigo-600 px-2 py-1 rounded">${user.points} pts</span>
                `;
                lbContainer.appendChild(item);
            });
        }

        // === 3. FUNGSI AUTH & LOGOUT ===
        async function handleAuth() {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPass').value;
            if (!email || !password) return alert("Isi email dan password!");

            let { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            if (error) {
                const { error: sErr } = await _supabase.auth.signUp({ email, password });
                if (sErr) return alert(sErr.message);
                alert("Akaun dicipta! Sila klik Login sekali lagi.");
            } else {
                window.location.reload();
            }
        }

        async function handleLogout() {
            await _supabase.auth.signOut();
            window.location.reload();
        }

        // === 4. FUNGSI LINKS (LOAD & DELETE) ===
        async function loadLinks(platform) {
            const container = document.getElementById('linksContainer');
            container.innerHTML = `<div class="text-center p-10">Mencari link ${platform}...</div>`;

            const { data, error } = await _supabase
                .from('links_pool')
                .select('*')
                .eq('platform', platform)
                .order('created_at', { ascending: false });

            if (!data || data.length === 0) {
                container.innerHTML = `<div class="bg-white p-10 rounded-xl text-center border-2 border-dashed">Tiada link ${platform} lagi.</div>`;
                return;
            }

            container.innerHTML = '';
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = "bg-white p-5 rounded-xl shadow-sm border border-slate-200 flex justify-between items-center mb-3";
                
                const isAdmin = currentUser && currentUser.email === ADMIN_EMAIL;
                const deleteBtn = isAdmin ? `<button onclick="deleteLink('${item.id}')" class="text-red-500 hover:text-red-700 text-xs font-bold ml-4">🗑️ Delete</button>` : '';

                card.innerHTML = `
                    <div class="flex-1">
                        <p class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest">${item.platform}</p>
                        <p class="font-bold text-slate-800 text-md">${item.caption}</p>
                    </div>
                    <div class="flex items-center">
                        <button onclick="engageLink('${item.url}')" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-bold text-sm transition">Support +1</button>
                        ${deleteBtn}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function deleteLink(id) {
            if (!confirm("Kau serius nak delete link ni?")) return;
            const { error } = await _supabase.from('links_pool').delete().eq('id', id);
            if (error) alert("Error: " + error.message);
            else location.reload();
        }

        // === 5. FUNGSI SUPPORT & SUBMIT ===
        async function engageLink(url) {
            window.open(url, '_blank');
            
            // 1. Tambah point kat skrin dulu (bagi user nampak laju)
            userPoints += 1;
            updateUI();

            // 2. SIMPAN KE DATABASE (Wajib ada await)
            if (currentUser) {
                const { error } = await _supabase
                    .from('profiles')
                    .update({ points: userPoints })
                    .eq('id', currentUser.id);
                
                if (error) {
                    console.error("Gagal simpan point ke DB:", error.message);
                    // Kalau gagal, kita tolak balik point kat skrin supaya user tak keliru
                    userPoints -= 1;
                    updateUI();
                    alert("Ops! Point tak dapat disimpan. Check internet atau login semula.");
                }
            }
        }

        async function submitLink() {
            const url = document.getElementById('newLinkUrl').value;
            const platform = document.getElementById('newLinkPlatform').value;
            const caption = document.getElementById('newLinkCaption').value;

            if (!url || !caption) return alert("Sila isi link dan caption!");
            if (userPoints < 5) return alert("Point tak cukup! Kena ada 5 point.");

            const { error } = await _supabase.from('links_pool').insert([
                { user_id: currentUser.id, url: url, platform: platform, caption: caption }
            ]);

            if (!error) {
                userPoints -= 5;
                await _supabase.from('profiles').update({ points: userPoints }).eq('id', currentUser.id);
                updateUI();
                alert("Link berjaya di-post!");
                location.reload();
            } else {
                alert("Gagal post link: " + error.message);
            }
        }

        function updateUI() {
            document.getElementById('pointDisplay').innerText = userPoints;
        }

        // Mula Check User
        checkUser();
        
    </script>
</body>
</html>
